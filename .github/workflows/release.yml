name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish release
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and build
        shell: pwsh
        run: dotnet build .\RelayBenchSuite.slnx -c Release -v minimal

      - name: Publish packages
        shell: pwsh
        run: .\publish.ps1 -Configuration Release -Runtime win-x64 -OutputRoot release

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          [xml]$props = Get-Content -LiteralPath .\Directory.Build.props
          $version = [string]$props.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version is empty."
          }

          $tag = "v$version"
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
          }

          $expectedTag = "v$version"
          if ($tag -ne $expectedTag) {
            throw "Tag '$tag' does not match project version '$expectedTag'."
          }

          $notesPath = Join-Path $pwd "docs\releases\$tag.md"
          if (-not (Test-Path -LiteralPath $notesPath)) {
            $notesPath = Join-Path $pwd "release\$tag-notes.md"
            Set-Content -LiteralPath $notesPath -Encoding utf8 -Value @"
          RelayBench $tag

          更新内容：
          - 本地透明代理升级为入口调度器，支持自动选路、fallback、限速、脱敏日志、缓存和实时观测。
          - 增强 Responses、Anthropic Messages 与 OpenAI Chat Completions 的协议探测和回退顺序。
          - 引入 CPA 风格的本地短缓存、模型列表缓存、并发请求合并和路由健康持久化。
          - 数据安全测试套件补齐 Prompt Injection、RAG 数据污染、恶意 URL / 命令诱导与 Jailbreak 等场景。
          - 优化托盘、悬浮 token 窗、透明代理页面、日志展开、单实例唤醒和启动日志中文编码。
          - 清理测试工程和临时编译产物，源码仓库只保留项目源码、必要文档和发布配置。

          发布包：
          - relaybench-$tag-win-x64-framework-dependent.zip
          - relaybench-$tag-win-x64-self-contained.zip
          "@
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=RelayBench $tag" >> $env:GITHUB_OUTPUT
          "notes=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $title = "${{ steps.meta.outputs.title }}"
          $notes = "${{ steps.meta.outputs.notes }}"
          $assets = @(
            "release\relaybench-$tag-win-x64-framework-dependent.zip",
            "release\relaybench-$tag-win-x64-framework-dependent.sha256.txt",
            "release\relaybench-$tag-win-x64-self-contained.zip",
            "release\relaybench-$tag-win-x64-self-contained.sha256.txt"
          )

          if (gh release view $tag *> $null) {
            foreach ($asset in $assets) {
              $assetName = Split-Path -Leaf $asset
              gh release delete-asset $tag $assetName --yes *> $null
            }

            gh release upload $tag @assets
            gh release edit $tag --title $title --notes-file $notes --latest
          }
          else {
            gh release create $tag @assets --title $title --notes-file $notes --latest --target $env:GITHUB_SHA
          }
